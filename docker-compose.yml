version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: db_mahasiswa_container
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: db_mahasiswa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
